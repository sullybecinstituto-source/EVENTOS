<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SullyBec Instituto - Control de Asistencias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .bg-brand-dark { background-color: #0f172a; } 
        .text-gold { color: #c5a059; } 
        .bg-gold { background-color: #c5a059; }
        
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .event-card.active {
            border-left: 4px solid #c5a059;
            background-color: #f1f5f9;
        }

        /* Estilo para el contenedor del logo */
        .logo-container {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
        }

        .logo-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Fallback si la imagen falla */
        .logo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #c5a059;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="app">
        <!-- Header -->
        <nav class="bg-brand-dark text-white shadow-xl border-b border-white/5">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-20 items-center">
                    <div class="flex items-center gap-4">
                        <!-- Logo con Manejo de Errores -->
                        <div class="logo-container">
                            <img id="mainLogo" 
                                 src="https://drive.google.com/uc?export=view&id=1gjM8QJhfynpT0il86P3IRWwD_wMQWcCC" 
                                 alt="SullyBec" 
                                 class="logo-img"
                                 onerror="this.style.display='none'; document.getElementById('logoFallback').classList.remove('hidden')">
                            <div id="logoFallback" class="logo-placeholder hidden">S</div>
                        </div>
                        <div class="border-l border-white/10 pl-4">
                            <h1 class="text-xl font-bold tracking-tight leading-none">SullyBec</h1>
                            <span class="text-[10px] text-gold uppercase tracking-[0.2em] font-bold">Instituto</span>
                        </div>
                    </div>
                    
                    <button id="btnNewEvent" class="bg-gold hover:opacity-90 text-white px-6 py-2.5 rounded-lg text-xs font-bold transition-all flex items-center gap-2 shadow-lg shadow-black/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                        </svg>
                        NUEVO EVENTO
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <!-- Lista de Eventos (Sidebar) -->
                <aside class="lg:col-span-3">
                    <div class="bg-white rounded-xl card-shadow border border-slate-200 overflow-hidden">
                        <div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Historial</span>
                            <span id="eventCount" class="bg-slate-200 text-slate-600 text-[10px] px-2 py-0.5 rounded font-bold">0</span>
                        </div>
                        <ul id="eventList" class="divide-y divide-slate-50 max-h-[60vh] overflow-y-auto">
                            <!-- Eventos -->
                        </ul>
                    </div>
                </aside>

                <!-- Panel Principal -->
                <section class="lg:col-span-9">
                    <div id="attendeeSection" class="hidden space-y-6">
                        
                        <!-- Encabezado de Evento -->
                        <div class="bg-white p-8 rounded-xl card-shadow border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h2 id="currentEventTitle" class="text-2xl font-bold text-slate-900 tracking-tight"></h2>
                                <p id="currentEventDate" class="text-slate-400 text-sm mt-1 flex items-center gap-2 font-medium">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                    <span></span>
                                </p>
                            </div>
                            <div class="flex gap-2">
                                <button id="btnExportExcel" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-lg text-xs font-bold transition-all flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                    </svg>
                                    EXCEL
                                </button>
                                <button id="btnDeleteEvent" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white p-2.5 rounded-lg transition-all">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Registro -->
                        <div class="bg-white p-6 rounded-xl card-shadow border border-slate-200">
                            <form id="attendeeForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <input type="hidden" id="editAttendeeId">
                                <input type="text" id="attName" required placeholder="Nombre Completo" class="bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-gold outline-none">
                                <input type="tel" id="attPhone" required placeholder="Teléfono / WhatsApp" class="bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-gold outline-none">
                                <button type="submit" id="btnSubmitAttendee" class="bg-brand-dark text-white font-bold py-3 rounded-lg hover:bg-black transition-all text-xs uppercase tracking-widest">
                                    Registrar Asistente
                                </button>
                            </form>
                        </div>

                        <!-- Tabla -->
                        <div class="bg-white rounded-xl card-shadow border border-slate-200 overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 border-b border-slate-100 text-[10px] uppercase font-black text-slate-400 tracking-widest">
                                    <tr>
                                        <th class="px-6 py-4 text-center">Asistió</th>
                                        <th class="px-6 py-4">Nombre</th>
                                        <th class="px-6 py-4">Teléfono</th>
                                        <th class="px-6 py-4 text-right">Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="attendeeTableBody" class="divide-y divide-slate-100 text-sm">
                                    <!-- Filas -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Estado Inicial -->
                    <div id="emptyState" class="flex flex-col items-center justify-center p-20 bg-white rounded-xl border border-slate-200 card-shadow text-center">
                        <div class="w-24 h-24 mb-6 bg-slate-50 rounded-full flex items-center justify-center opacity-50">
                             <img src="https://drive.google.com/uc?export=view&id=1gjM8QJhfynpT0il86P3IRWwD_wMQWcCC" class="h-12 w-auto grayscale">
                        </div>
                        <h3 class="text-xl font-bold text-slate-800">SullyBec Instituto</h3>
                        <p class="text-slate-400 mt-2 max-w-xs text-sm">Seleccione un evento o cree uno nuevo para gestionar las asistencias.</p>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Modal Nuevo Evento -->
    <div id="modalEvent" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-8 shadow-2xl border border-slate-100">
            <h3 class="text-xl font-bold text-slate-900 mb-6">Nuevo Evento</h3>
            <form id="eventForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Nombre</label>
                    <input type="text" id="evName" required class="w-full border border-slate-200 rounded-lg p-3 focus:ring-2 focus:ring-gold outline-none text-sm" placeholder="Ej. Taller de Maquillaje">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Fecha</label>
                    <input type="date" id="evDate" required class="w-full border border-slate-200 rounded-lg p-3 focus:ring-2 focus:ring-gold outline-none text-sm">
                </div>
                <div class="flex flex-col gap-2 pt-4">
                    <button type="submit" class="w-full bg-gold text-white rounded-lg py-3 font-bold hover:opacity-90 transition-all text-xs uppercase tracking-widest">Crear Ahora</button>
                    <button type="button" id="btnCloseEventModal" class="w-full py-3 text-slate-400 font-bold hover:text-slate-600 transition-all text-[10px] uppercase tracking-widest">Cerrar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sullybec-instituto';

        let currentEventId = null;
        let events = [];
        let attendees = [];
        let unsubscribeAttendees = null;

        async function initAuth() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        }

        initAuth();

        onAuthStateChanged(auth, (u) => {
            if (u) subscribeToEvents();
        });

        function subscribeToEvents() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'eventos'), (snap) => {
                events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                events.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
                document.getElementById('eventCount').innerText = events.length;
                renderEvents();
            });
        }

        function subscribeToAttendees(eventId) {
            if (unsubscribeAttendees) unsubscribeAttendees();
            const q = collection(db, 'artifacts', appId, 'public', 'data', `asistentes_${eventId}`);
            unsubscribeAttendees = onSnapshot(q, (snap) => {
                attendees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                attendees.sort((a, b) => a.nombre.localeCompare(b.nombre));
                renderAttendees();
            });
        }

        function renderEvents() {
            const list = document.getElementById('eventList');
            list.innerHTML = events.length ? '' : '<li class="p-6 text-center text-slate-400 text-[10px] italic">No hay eventos</li>';
            events.forEach(ev => {
                const isActive = currentEventId === ev.id;
                const li = document.createElement('li');
                li.className = `p-4 cursor-pointer transition-all event-card ${isActive ? 'active' : 'hover:bg-slate-50'}`;
                li.innerHTML = `
                    <p class="font-bold text-slate-800 text-sm truncate">${ev.nombre}</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase mt-0.5">${ev.fecha}</p>
                `;
                li.onclick = () => {
                    currentEventId = ev.id;
                    document.getElementById('attendeeSection').classList.remove('hidden');
                    document.getElementById('emptyState').classList.add('hidden');
                    document.getElementById('currentEventTitle').innerText = ev.nombre;
                    document.getElementById('currentEventDate').querySelector('span').innerText = ev.fecha;
                    renderEvents();
                    subscribeToAttendees(ev.id);
                };
                list.appendChild(li);
            });
        }

        function renderAttendees() {
            const tbody = document.getElementById('attendeeTableBody');
            tbody.innerHTML = attendees.length ? '' : '<tr><td colspan="4" class="p-10 text-center text-slate-400 italic">Lista vacía</td></tr>';
            attendees.forEach(att => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 text-center">
                        <input type="checkbox" ${att.asistio ? 'checked' : ''} 
                            class="w-5 h-5 rounded border-slate-300 text-gold focus:ring-gold"
                            onchange="window.updateStatus('${att.id}', this.checked)">
                    </td>
                    <td class="px-6 py-4 font-bold text-slate-700">${att.nombre}</td>
                    <td class="px-6 py-4 text-slate-400 font-mono text-xs">${att.telefono}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="window.edit('${att.id}')" class="text-slate-300 hover:text-gold mr-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg></button>
                        <button onclick="window.del('${att.id}')" class="text-slate-300 hover:text-red-500"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('btnNewEvent').onclick = () => document.getElementById('modalEvent').classList.remove('hidden');
        document.getElementById('btnCloseEventModal').onclick = () => document.getElementById('modalEvent').classList.add('hidden');

        document.getElementById('eventForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = { nombre: document.getElementById('evName').value, fecha: document.getElementById('evDate').value };
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'eventos'), data);
            document.getElementById('modalEvent').classList.add('hidden');
            e.target.reset();
        };

        document.getElementById('attendeeForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editAttendeeId').value;
            const data = { nombre: document.getElementById('attName').value, telefono: document.getElementById('attPhone').value, asistio: false };
            const path = `asistentes_${currentEventId}`;
            if (id) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', path, id), data);
                document.getElementById('editAttendeeId').value = '';
                document.getElementById('btnSubmitAttendee').innerText = 'Registrar Asistente';
            } else {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', path), data);
            }
            e.target.reset();
        };

        document.getElementById('btnExportExcel').onclick = () => {
            const data = attendees.map(a => ({ "Nombre": a.nombre, "Teléfono": a.telefono, "Asistencia": a.asistio ? 'SÍ' : 'NO' }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Asistentes");
            XLSX.writeFile(wb, `SullyBec_${document.getElementById('currentEventTitle').innerText}.xlsx`);
        };

        document.getElementById('btnDeleteEvent').onclick = async () => {
            if (confirm("¿Eliminar este evento?") && currentEventId) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'eventos', currentEventId));
                location.reload();
            }
        };

        window.updateStatus = async (id, val) => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', `asistentes_${currentEventId}`, id), { asistio: val });
        };
        window.del = async (id) => {
            if (confirm("¿Eliminar registro?"))
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `asistentes_${currentEventId}`, id));
        };
        window.edit = (id) => {
            const a = attendees.find(x => x.id === id);
            document.getElementById('attName').value = a.nombre;
            document.getElementById('attPhone').value = a.telefono;
            document.getElementById('editAttendeeId').value = id;
            document.getElementById('btnSubmitAttendee').innerText = 'Guardar Cambios';
            document.getElementById('attName').focus();
        };
    </script>
</body>
</html>
